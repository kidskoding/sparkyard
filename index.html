<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sparkyard</title>
<style>
  :root { --bronze:#cd7f32; --silver:#c9d1d9; --gold:#ffd166; --bg:#0d1117; --panel:#161b22;
          --line:#30363d; --accent:#2ea6ff; --danger:#ff4d4f; --text:#e6edf3; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--text);
              font:14px/1.4 -apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden; }
  #viewport { position:fixed; inset:0; overflow:hidden;
              background:radial-gradient(circle at 1px 1px,#1b2230 1px,transparent 0) 0 0/24px 24px; }
  #world { position:absolute; inset:0; transform-origin:0 0; }
  #wires { position:absolute; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none; }
  .wire { fill:none; stroke:var(--accent); stroke-width:2.5; opacity:.7; }
  .node { position:absolute; width:190px; background:var(--panel); border:1px solid var(--line);
          border-radius:10px; padding:10px 12px; cursor:grab; user-select:none;
          box-shadow:0 6px 20px rgba(0,0,0,.35); transition:box-shadow .15s,border-color .15s; }
  .node:active { cursor:grabbing; }
  .node .title { font-weight:600; }
  .node .rows { margin-top:6px; font-variant-numeric:tabular-nums; opacity:.75; font-size:12px; }
  .node[data-tier=bronze] { border-left:4px solid var(--bronze); }
  .node[data-tier=silver] { border-left:4px solid var(--silver); }
  .node[data-tier=gold]   { border-left:4px solid var(--gold); }
  .port { position:absolute; top:34px; width:12px; height:12px; border-radius:50%;
          background:var(--accent); border:2px solid var(--bg); }
  .port.in { left:-7px; } .port.out { right:-7px; }
  #palette { position:fixed; left:16px; top:16px; display:flex; flex-direction:column; gap:6px;
             background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:10px; z-index:5; }
  #palette button { background:#21262d; color:var(--text); border:1px solid var(--line);
                    border-radius:8px; padding:8px 10px; cursor:pointer; text-align:left; }
  #palette button:hover { border-color:var(--accent); }
  .wire.broken { stroke:var(--danger); stroke-width:5; stroke-dasharray:10 7; opacity:1;
                 pointer-events:stroke; cursor:pointer; animation:dashflow .6s linear infinite;
                 filter:drop-shadow(0 0 6px rgba(255,77,79,.8)); }
  @keyframes dashflow { to { stroke-dashoffset:-17; } }
  #cash { position:fixed; right:16px; top:16px; z-index:5; background:var(--panel);
          border:1px solid var(--gold); color:var(--gold); font-weight:700; font-size:18px;
          padding:10px 18px; border-radius:10px; font-variant-numeric:tabular-nums; }
  #cash.pop { animation:pop .3s; }
  @keyframes pop { 50% { transform:scale(1.15); } }
  #orders { position:fixed; top:16px; left:50%; transform:translateX(-50%); display:flex; gap:10px; z-index:5; }
  .order { background:var(--panel); border:1px solid var(--line); border-radius:10px;
           padding:8px 14px; min-width:180px; font-size:13px; }
  .order .bar { height:4px; background:var(--accent); border-radius:2px; margin-top:6px; }
  .order.done { border-color:#3fb950; box-shadow:0 0 12px rgba(63,185,80,.5); }
  .order.fail { border-color:var(--danger); box-shadow:0 0 12px rgba(255,77,79,.5); }
  .float { position:fixed; z-index:9; font-weight:700; animation:rise 1s ease-out forwards; pointer-events:none; }
  @keyframes rise { to { transform:translateY(-40px); opacity:0; } }
  #inspector { position:fixed; left:50%; transform:translateX(-50%); bottom:16px; z-index:5; max-width:70vw;
               background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 16px; }
  .node.running { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent),0 6px 24px rgba(46,166,255,.4); }
  .node.error { border-color:var(--danger); animation:shake .3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
</style>
</head>
<body>
<div id="viewport"><div id="world"><svg id="wires"></svg></div></div>
<script type="module">
import { NODE_TYPES, createGraph, addNode, addEdge, canConnect, createSim, stepSim, validateGraph,
         breakEdge, repairEdge, spawnOrder } from './engine.js';

const world = document.getElementById('world');
const wires = document.getElementById('wires');
const NS = 'http://www.w3.org/2000/svg';
const W = 190, PORT_Y = 34;
const outPos = n => ({ x: n.x + W, y: n.y + PORT_Y });
const inPos  = n => ({ x: n.x,     y: n.y + PORT_Y });

const graph = createGraph();
function seed() {
  const defs = [['source',60,120],['bronze',320,120],['clean',580,120],
    ['silver',840,120],['agg',1100,120],['gold',1360,120]];
  const ids = defs.map(([t,x,y]) => addNode(graph, { type:t, x, y }).id);
  for (let i=0;i<ids.length-1;i++) addEdge(graph, ids[i], ids[i+1]);
}
seed();

function wirePath(a, b) {
  const p1 = outPos(a), p2 = inPos(b);
  const k = Math.max(40, Math.min(160, (p2.x - p1.x) / 2));
  return `M ${p1.x} ${p1.y} C ${p1.x+k} ${p1.y}, ${p2.x-k} ${p2.y}, ${p2.x} ${p2.y}`;
}

function render() {
  // nodes
  for (const n of graph.nodes) {
    let el = document.getElementById('node-'+n.id);
    const t = NODE_TYPES[n.type];
    if (!el) {
      el = document.createElement('div');
      el.id = 'node-'+n.id; el.className = 'node'; el.dataset.id = n.id;
      if (t.tier) el.dataset.tier = t.tier;
      el.innerHTML = `<div class="title">${t.label}</div>
        <div class="rows" data-rows>${t.kind==='source'?'∞ source':'0 rows'}</div>
        <div class="port in"></div><div class="port out"></div>`;
      world.appendChild(el);
    }
    el.style.left = n.x+'px'; el.style.top = n.y+'px';
  }
  // wires
  wires.querySelectorAll('.wire').forEach(w => w.remove());
  for (const e of graph.edges) {
    const a = graph.nodes.find(n=>n.id===e.from), b = graph.nodes.find(n=>n.id===e.to);
    const path = document.createElementNS(NS,'path');
    path.setAttribute('class', e.broken ? 'wire broken' : 'wire'); path.dataset.edge = e.id;
    path.setAttribute('d', wirePath(a,b));
    wires.appendChild(path);
  }
}
render();

// expose for tests / later tasks
window.__sparkyard = { graph, render, wirePath };

// --- coordinate helper (no zoom yet: world is untransformed) ---
const viewport = document.getElementById('viewport');
const toWorld = (cx, cy) => { const r = viewport.getBoundingClientRect(); return { x: cx-r.left, y: cy-r.top }; };

// --- drag nodes ---
let drag = null;
world.addEventListener('pointerdown', ev => {
  const nodeEl = ev.target.closest('.node');
  if (!nodeEl || ev.target.classList.contains('port')) return;
  const id = +nodeEl.dataset.id;
  const n = graph.nodes.find(x=>x.id===id);
  const w = toWorld(ev.clientX, ev.clientY);
  drag = { id, dx: w.x - n.x, dy: w.y - n.y };
  nodeEl.setPointerCapture(ev.pointerId);
});
world.addEventListener('pointermove', ev => {
  if (!drag) return;
  const w = toWorld(ev.clientX, ev.clientY);
  moveNodePos(drag.id, w.x - drag.dx, w.y - drag.dy);
});
world.addEventListener('pointerup', () => drag = null);

function moveNodePos(id, x, y) {
  const n = graph.nodes.find(v=>v.id===id); n.x = x; n.y = y;
  const el = document.getElementById('node-'+id); el.style.left = x+'px'; el.style.top = y+'px';
  for (const e of graph.edges) if (e.from===id||e.to===id) {
    const a = graph.nodes.find(v=>v.id===e.from), b = graph.nodes.find(v=>v.id===e.to);
    wires.querySelector(`.wire[data-edge="${e.id}"]`).setAttribute('d', wirePath(a,b));
  }
}

// --- live wire draw from output ports ---
let pending = null;
const temp = document.createElementNS(NS,'path'); temp.setAttribute('class','wire'); temp.style.opacity=.4;
world.addEventListener('pointerdown', ev => {
  if (!ev.target.classList.contains('out')) return;
  const id = +ev.target.closest('.node').dataset.id;
  pending = { from: id }; wires.appendChild(temp); ev.stopPropagation();
});
window.addEventListener('pointermove', ev => {
  if (!pending) return;
  const a = graph.nodes.find(n=>n.id===pending.from);
  const p1 = outPos(a), w = toWorld(ev.clientX, ev.clientY);
  const k = Math.max(40, Math.min(160,(w.x-p1.x)/2));
  temp.setAttribute('d', `M ${p1.x} ${p1.y} C ${p1.x+k} ${p1.y}, ${w.x-k} ${w.y}, ${w.x} ${w.y}`);
});
window.addEventListener('pointerup', ev => {
  if (!pending) return;
  const inEl = ev.target.classList.contains('in') ? ev.target.closest('.node') : null;
  if (inEl) {
    const to = +inEl.dataset.id;
    const chk = canConnect(graph, pending.from, to);
    if (chk.ok) { addEdge(graph, pending.from, to); render(); }
    else { inEl.animate([{outline:'2px solid var(--danger)'},{outline:'2px solid transparent'}],{duration:500}); }
  }
  temp.remove(); pending = null;
});

// --- palette ---
const palette = document.createElement('div'); palette.id = 'palette';
for (const [type, t] of Object.entries(NODE_TYPES)) {
  const b = document.createElement('button'); b.textContent = t.label;
  b.onclick = () => { const r = viewport.getBoundingClientRect();
    addNode(graph, { type, x: r.width/2-95, y: r.height/2-30 }); render(); };
  palette.appendChild(b);
}
document.body.appendChild(palette);

// --- HUD: cash + orders + inspector/ticker ---
const cashEl = document.createElement('div'); cashEl.id='cash'; cashEl.textContent='$0';
document.body.appendChild(cashEl);
const ordersBox = document.createElement('div'); ordersBox.id='orders';
document.body.appendChild(ordersBox);
const inspector = document.createElement('div'); inspector.id='inspector';
inspector.textContent = 'The plant is live — data is flowing. Click anything to learn what it is.';
document.body.appendChild(inspector);

function announce(html){
  inspector.innerHTML = html;
  inspector.animate([{transform:'translateX(-50%) scale(1.06)'},{transform:'translateX(-50%) scale(1)'}],{duration:250});
}
function floatText(text, x, y, color){
  const f = document.createElement('div'); f.className='float'; f.textContent=text;
  f.style.left=x+'px'; f.style.top=y+'px'; f.style.color=color;
  document.body.appendChild(f);
  f.addEventListener('animationend', () => f.remove());
}

world.addEventListener('click', ev => { const el = ev.target.closest('.node'); if(!el) return;
  const n = graph.nodes.find(x=>x.id===+el.dataset.id);
  announce(`<b>${NODE_TYPES[n.type].label}</b> — ${NODE_TYPES[n.type].concept}`);
});

// --- incidents: schema drift snaps a pipe; click the red pipe to repair ---
function strikeIncident(){
  const candidates = graph.edges.filter(e => !e.broken);
  if (!candidates.length) return;
  const e = candidates[(Math.random()*candidates.length)|0];
  breakEdge(graph, e.id);
  const path = wires.querySelector(`.wire[data-edge="${e.id}"]`);
  if (path) path.classList.add('broken');
  const toNode = graph.nodes.find(n=>n.id===e.to);
  const toEl = document.getElementById('node-'+e.to);
  if (toEl) toEl.animate([{transform:'translateX(0)'},{transform:'translateX(-5px)'},{transform:'translateX(5px)'},{transform:'translateX(0)'}],{duration:300});
  announce(`⚠️ <b>Schema drift!</b> Upstream data changed shape mid-flow — the pipe into <b>${NODE_TYPES[toNode.type].label}</b> snapped. Rows are being lost. <b>Click the red pipe to repair.</b>`);
}
wires.addEventListener('click', ev => {
  const path = ev.target.closest('.wire.broken');
  if (!path) return;
  repairEdge(graph, +path.dataset.edge);
  path.classList.remove('broken');
  floatText('🔧 repaired', ev.clientX-30, ev.clientY-20, '#3fb950');
  announce(`✅ <b>Repaired.</b> Schema realigned (like Delta schema enforcement catching drift) — flow resumes.`);
});

// --- SLA orders: analysts demand gold rows on a deadline ---
const orderEls = new Map(); // order id → card el
function placeOrder(){
  const rows = 3 + (Math.random()*3|0);
  const ttl = 18 + Math.random()*8;
  const o = spawnOrder(sim, graph, { tier:'gold', rows, ttl, bounty: rows*25, penalty: 60 });
  o.ttl0 = ttl;
  const card = document.createElement('div'); card.className='order';
  card.innerHTML = `📊 Dashboard wants <b>${rows} gold rows</b><div class="bar"></div>`;
  ordersBox.appendChild(card);
  orderEls.set(o.id, card);
}
function updateOrders(){
  for (const o of sim.orders) {
    const card = orderEls.get(o.id);
    if (!card) continue;
    if (o.status === 'open') {
      card.querySelector('.bar').style.width = Math.max(0, o.ttl/o.ttl0*100)+'%';
    } else {
      const r = cashEl.getBoundingClientRect();
      if (o.status === 'fulfilled') { card.classList.add('done'); floatText(`+$${o.bounty}`, r.left, r.top-10, '#3fb950'); }
      else { card.classList.add('fail'); floatText(`-$${o.penalty}`, r.left, r.top-10, 'var(--danger)'); }
      orderEls.delete(o.id);
      setTimeout(() => card.remove(), 1200);
    }
  }
}

// --- the plant is always on ---
const sim = createSim(graph);
let last = performance.now();
let nextIncidentAt = 10, nextOrderAt = 5;
const particles = new Map(); // inflight obj → circle el

function edgePoint(edgeId, t){ const p = wires.querySelector(`.wire[data-edge="${edgeId}"]`); return p ? p.getPointAtLength(t*p.getTotalLength()) : null; }

function tick(ts){
  const dt = Math.min(0.05, (ts-last)/1000 || 0); last = ts;
  stepSim(sim, graph, dt);
  // pressure schedule
  if (sim.t >= nextIncidentAt) { strikeIncident(); nextIncidentAt = sim.t + 9 + Math.random()*6; }
  if (sim.t >= nextOrderAt)    { placeOrder();     nextOrderAt    = sim.t + 12 + Math.random()*6; }
  // particles
  const live = new Set(sim.inflight);
  for (const [obj, el] of particles) if (!live.has(obj)) { el.remove(); particles.delete(obj); }
  for (const p of sim.inflight) {
    let el = particles.get(p);
    if (!el) { el = document.createElementNS(NS,'circle'); el.setAttribute('r','4'); el.setAttribute('fill','var(--accent)');
               wires.appendChild(el); particles.set(p, el); }
    const pt = edgePoint(p.edgeId, Math.min(1,p.progress));
    if (!pt) continue; // wire gone (e.g. edge removed mid-run) — skip this particle
    el.setAttribute('cx', pt.x); el.setAttribute('cy', pt.y);
  }
  // counters + glow
  for (const n of graph.nodes) {
    const el = document.getElementById('node-'+n.id);
    if (NODE_TYPES[n.type].kind !== 'source') el.querySelector('[data-rows]').textContent = (sim.rows[n.id]||0)+' rows';
    el.classList.toggle('running', sim.inflight.some(p => {
      const e = graph.edges.find(x=>x.id===p.edgeId); return e && (e.from===n.id||e.to===n.id);
    }));
  }
  // cash + orders
  if (+cashEl.dataset.cash !== sim.cash) {
    cashEl.dataset.cash = sim.cash;
    cashEl.textContent = `$${sim.cash}`;
    cashEl.classList.remove('pop'); void cashEl.offsetWidth; cashEl.classList.add('pop');
  }
  updateOrders();
  // orphan check (a node someone spawned but never wired)
  const orphans = new Set(validateGraph(graph).map(e => e.nodeId));
  for (const n of graph.nodes) document.getElementById('node-'+n.id).classList.toggle('error', orphans.has(n.id));
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// expose for smoke tests
Object.assign(window.__sparkyard, { sim, strikeIncident, placeOrder });
</script>
</body>
</html>
